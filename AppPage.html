<!DOCTYPE html>
<html xmlns="http://w3.org">
<head>
    <meta charset="UTF-8" />
    <title>Просмотр приложения - CodornizCorp</title>
    <link href="//Microsoft.WinJS.2.0/css/ui-dark.css" rel="stylesheet" />
    <script src="//Microsoft.WinJS.2.0/js/base.js"></script>
    <script src="//Microsoft.WinJS.2.0/js/ui.js"></script>
    <style>
        html, body { margin: 0; background: url('images/storebgr.jpg') no-repeat fixed center / 100% 100% !important; background-color: #228B22 !important; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; overflow-y: auto; width: 100vw; height: 100vh; }

        .topbar-codorniz-logo { height: 100%; width: auto; max-height: 70px; object-fit: contain; margin-right: 14px; cursor: pointer; }
        .store-brand { font-size: 24px; font-weight: 300; margin-right: 32px; cursor: pointer; }
        .page-title { font-size: 24px; font-weight: 200; cursor: pointer; margin-right: 30px; }
        #view-wrapper { padding: 40px 80px; display: flex; gap: 60px; box-sizing: border-box; opacity: 0; }
        .download-sidebar { width: 280px; }
        .download-icon { width: 140px; height: 140px; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; background-color: rgba(0,0,0,0.2); }
        .metro-progress-container { width: 100%; height: 10px; background: rgba(255,255,255,0.15); margin: 25px 0 10px 0; display: none; }
        .metro-progress-bar { width: 0%; height: 100%; background: #228B22; transition: width 0.1s linear; }
        .btn-install { background: #228B22; color: #fff; padding: 12px 30px; width: 100%; cursor: pointer; border: none; font-size: 16px; font-weight: bold; }
        .btn-install.btn-open-ready { background: #1ba1e2 !important; }
        .btn-back { background: transparent; color: #aaa; border: 2px solid #555; padding: 8px 20px; width: 100%; cursor: pointer; margin-top: 10px; }
        .download-details { flex: 1; }
        .download-details h1 { font-weight: 200; font-size: 42px; margin: 0; }
        .publisher { color: #228B22; font-weight: bold; margin-top: 5px; }
        .description { color: #ccc; max-width: 700px; margin-top: 20px; font-size: 16px; line-height: 1.5; }
        .comments-container { margin-top: 40px; width: 100%; max-width: 800px; border: none; height: 400px; background: rgba(0,0,0,0.2); }
        .metro-activa { opacity: 1 !important; animation: metroEntrance 0.42s cubic-bezier(0.1, 0.9, 0.2, 1) forwards; }
        @keyframes metroEntrance { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: translateX(0); } }
    </style>

    <div id="topbar">

</body>
</html>
